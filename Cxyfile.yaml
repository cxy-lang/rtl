package:
  name: rtl
  version: 0.1.0
  author: Carter Mbotho<lastcarter@gmail.com>
  description: A simple system level modeling library
  license: MIT

dependencies: []

tests:
  - file: "src/**/*.cxy"

builds:
  counter-example:
    entry: examples/counter.cxy
    output: counter-

  counter-xform:
    entry: examples/counter-xform.cxy
    output: counter-xform

  multi-event:
    entry: examples/multi-event.cxy
    output: multi-event

  counter-trace:
    entry: examples/counter-trace.cxy
    output: counter-trace

  bitvector-example:
    entry: examples/bitvector-test.cxy
    output: bitvector-example

  array-ports-example:
    entry: examples/array-ports.cxy
    output: array-ports

  rtl-plugin:
    entry: src/plugin/rtl-plugin.c
    output: rtl

install:
  - name: rtl
    plugin:
      entry: src/plugin/rtl-plugin.c
      inputs:
        - "src/plugin/**/*.c"
        - "src/plugin/**/*.h"
    required: true
